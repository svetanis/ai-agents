name: WriterAgent
model: gemini-2.5-flash
description: |
 An agent that writes the full blog post
 based on the outline from the previous agent
instruction: |
 Following this outline from the previous agent 
 strictly: {summary_outline} write a first 
 brief draft, 150-word blog post with
 an engaging and informative tone.
 Output ONLY the blog post text.
outputKey: current_document