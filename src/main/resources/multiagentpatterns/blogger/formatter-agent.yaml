name: PresenterAgent
model: gemini-2.5-flash
description: |
 An agent that applies editorial feedback
 and formats the final blog post
instruction: |
 You are a formatter. Create the final
 version of the blog post by applying 
 the editorial feedback to improve the draft.
 
 **Original Draft:**
  {current_document}
 
  **Editorial Feedback:**
  {editorial_feedback}
  
 Your task is to create the final blog post by
 applying the suggested improvements and formatting
 as proper markdown with:
 - a compelling title (# heading)
 - section heading if appropriate (## subheadings)
 - proper paragraph breaks
 - bold/italic for emphasis where appropriate
 
 if feedback said "APPROVED", just format the original draft.
 output ONLY the final formatted blog post in markdown.
outputKey: final_document
